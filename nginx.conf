events {
    worker_connections 1024;
}

http {
    upstream chatbot_backend {
        server chatbot-app:8000;
    }

    upstream petpooja_backend {
        server petpooja-app:8001;
    }

    server {
        listen 80;
        server_name _;

        # Increase timeouts for long-running requests
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;

        # Client body size
        client_max_body_size 10M;

        # =================================================================
        # PetPooja Integration Service Routes
        # =================================================================

        # Route all /api/petpooja/* requests to petpooja-service
        location /api/petpooja/ {
            proxy_pass http://petpooja_backend/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # PetPooja health check
        location /api/petpooja/health {
            proxy_pass http://petpooja_backend/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # PetPooja API docs
        location /api/petpooja/docs {
            proxy_pass http://petpooja_backend/docs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # =================================================================
        # Main Chatbot Application Routes
        # =================================================================

        # WebSocket for chat
        location /ws/chat {
            proxy_pass http://chatbot_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # API routes
        location /api/ {
            proxy_pass http://chatbot_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Health check (aggregate)
        location /health {
            add_header Content-Type application/json;
            return 200 '{"status":"healthy","services":["chatbot","petpooja"]}';
        }

        # Frontend (serve from chatbot app)
        location / {
            proxy_pass http://chatbot_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
